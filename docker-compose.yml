version: "3.9"

services:
  api:
    build: .
    command: python -m uvicorn inboxanchor.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env

  dashboard:
    build: .
    command: python -m streamlit run inboxanchor/app/dashboard.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    env_file:
      - .env
